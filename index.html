<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crown n Cradle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #F3EDE1;
      --dark:    #1C1710;
      --mid:     #6B5E4A;
      --sage:    #3D5C38;
      --sage-lt: #4E7249;
      --gold:    #C4A265;
      --border:  rgba(28, 23, 16, 0.10);
    }

    html, body {
      min-height: 100%;
      background: var(--cream);
      color: var(--dark);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 64px;
    }

    /* ── Logo / crown ──────────────────────────────── */
    .crown {
      width: 52px;
      height: 52px;
      margin-bottom: 20px;
      opacity: 0.82;
    }

    /* ── Brand name ────────────────────────────────── */
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--gold);
      margin: 14px auto 16px;
    }

    /* ── Tagline ───────────────────────────────────── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      font-style: italic;
      color: var(--mid);
      text-align: center;
      line-height: 1.5;
      max-width: 280px;
      margin-bottom: 48px;
    }

    /* ── Links ─────────────────────────────────────── */
    .links {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      color: var(--dark);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      position: relative;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(28, 23, 16, 0.08);
      background: #FDFAF4;
    }

    .link-btn:active { transform: translateY(0); }

    .link-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .link-icon svg { width: 20px; height: 20px; }

    .link-label {
      flex: 1;
    }

    .link-platform {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 3px;
    }

    .link-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--dark);
    }

    .link-arrow {
      color: var(--gold);
      font-size: 18px;
      opacity: 0.7;
    }

    /* platform accent dots */
    .dot-yt  { background: #FEF0EF; }
    .dot-ig  { background: #F5EFF8; }
    .dot-tt  { background: #EEF5F5; }
    .dot-fb  { background: #EEF2FA; }

    .dot-yt svg  { color: #E02F2F; }
    .dot-ig svg  { color: #C13584; }
    .dot-tt svg  { color: #1a1a1a; }
    .dot-fb svg  { color: #1877F2; }

    /* ── Footer ────────────────────────────────────── */
    .footer {
      margin-top: 52px;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
      opacity: 0.5;
      text-align: center;
    }
  </style>
</head>
<body>

  </div>

</html>
